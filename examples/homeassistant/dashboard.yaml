title: OpenAI Codex Proxy
views:
  - title: Proxy
    path: codex-proxy
    icon: mdi:api
    cards:
      - type: entities
        title: OpenAI Codex Proxy
        entities:
          - entity: sensor.openai_codex_proxy_status
            name: Status
          - entity: sensor.openai_codex_proxy_accounts_loaded
            name: Accounts Loaded
          - entity: sensor.openai_codex_proxy_accounts_healthy
            name: Accounts Healthy
          - entity: sensor.openai_codex_proxy_next_account
            name: Next Account
          - entity: sensor.openai_codex_proxy_plan
            name: Plan
          - entity: sensor.openai_codex_proxy_primary_remaining
            name: Primary Remaining
          - entity: sensor.openai_codex_proxy_secondary_remaining
            name: Secondary Remaining

      - type: markdown
        title: Account Capacity
        content: >
          {% set accounts = state_attr('sensor.openai_codex_proxy_status', 'accounts') or [] %}
          {% if not accounts %}
          No account status data available yet.
          {% else %}
          {% for account in accounts %}
          ### {{ account.name }}
          - Healthy: {{ account.healthy }}
          - Last used: {{ account.last_used or 'never' }}
          - Last refresh: {{ account.last_refresh or 'unknown' }}
          - Access token expires in: {{ account.access_token_expires_in_seconds if account.access_token_expires_in_seconds is not none else 'unknown' }} s
          - Refresh recommended: {{ account.refresh_recommended }}
          - Disabled for: {{ account.disabled_for_seconds if account.disabled_for_seconds is not none else 0 }} s
          - Primary remaining: {{ account.quota.primary_remaining_percent if account.quota is defined and account.quota and account.quota.primary_remaining_percent is defined and account.quota.primary_remaining_percent is not none else 'unknown' }}%
          - Secondary remaining: {{ account.quota.secondary_remaining_percent if account.quota is defined and account.quota and account.quota.secondary_remaining_percent is defined and account.quota.secondary_remaining_percent is not none else 'unknown' }}%

          {% endfor %}
          {% endif %}

      - type: markdown
        title: Raw Status JSON
        content: >
          ```json
          {{ state_attr('sensor.openai_codex_proxy_status', 'accounts') | tojson }}
          ```
